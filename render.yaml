services:
  - type: web
    name: mediguide-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker main:app --chdir backend --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mediguide-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: mediguide-db
    plan: free
